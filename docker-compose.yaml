services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: habit-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-habittracker}
      POSTGRES_USER: ${DB_USER:-habituser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-habituser} -d ${DB_NAME:-habittracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-mcp:
    image: crystaldba/postgres-mcp:latest
    container_name: habit-tracker-mcp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URI: postgresql://${DB_USER:-habituser}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/${DB_NAME:-habittracker}
    ports:
      - "8000:8000"
    command: ["--access-mode=unrestricted", "--transport=sse"]

volumes:
  postgres_data:
    driver: local