server {
  host = "0.0.0.0"
  host = ${?APP_HOST}
  port = 8080
  port = ${?APP_PORT}
}

database {
  driver   = "org.postgresql.Driver"
  url      = "jdbc:postgresql://localhost:5433/habittracker"
  user     = "habituser"
  user     = ${?DB_USER}
  password = ""
  password = ${?DB_PASSWORD}
}

akka {
  loglevel = "INFO"
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"

  actor {
    default-dispatcher {
      fork-join-executor {
        parallelism-min = 2
        parallelism-factor = 2.0
        parallelism-max = 8
      }
    }
  }

  http {
    server {
      idle-timeout = 60s
      request-timeout = 30s
    }
  }
}
