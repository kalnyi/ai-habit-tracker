openapi: 3.0.3
info:
  title: Habit Tracker API
  version: 0.1.0
  description: "CRUD API for user habits (ASDLC PoC)."
servers:
  - url: http://localhost:8080
paths:
  /users/{userId}/habits:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      summary: Create a habit
      operationId: createHabit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHabitRequest'
      responses:
        '201':
          description: Habit created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List all habits
      operationId: listHabits
      responses:
        '200':
          description: List of habits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HabitResponse'
  /users/{userId}/habits/{habitId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: habitId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a habit by ID
      operationId: getHabit
      responses:
        '200':
          description: Habit found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitResponse'
        '400':
          description: Invalid ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Habit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update a habit
      operationId: updateHabit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHabitRequest'
      responses:
        '200':
          description: Habit updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Habit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a habit
      operationId: deleteHabit
      responses:
        '204':
          description: Habit deleted successfully
        '400':
          description: Invalid ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Habit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{userId}/habits/{habitId}/completions:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: habitId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Record a habit completion
      operationId: recordHabitCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHabitCompletionRequest'
      responses:
        '201':
          description: Completion recorded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitCompletionResponse'
        '400':
          description: Invalid habitId format, missing or unparseable completedOn, or malformed JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Habit not found or soft-deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A completion already exists for this habit on the given date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List completions for a habit
      operationId: listHabitCompletions
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter to completions on or after this date (YYYY-MM-DD)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter to completions on or before this date (YYYY-MM-DD)
      responses:
        '200':
          description: List of completions ordered by completedOn descending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HabitCompletionResponse'
        '400':
          description: Invalid habitId format or unparseable from/to date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Habit not found or soft-deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{userId}/habits/{habitId}/completions/{completionId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: habitId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: completionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      summary: Delete a habit completion
      operationId: deleteHabitCompletion
      responses:
        '204':
          description: Completion deleted successfully
        '400':
          description: Invalid habitId or completionId format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Habit not found, or completion not found, or completion belongs to a different habit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    Frequency:
      type: string
      enum:
        - daily
        - weekly
    CreateHabitRequest:
      type: object
      required:
        - name
        - frequency
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        frequency:
          $ref: '#/components/schemas/Frequency'
    UpdateHabitRequest:
      type: object
      required:
        - name
        - frequency
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        frequency:
          $ref: '#/components/schemas/Frequency'
    HabitResponse:
      type: object
      required:
        - id
        - name
        - frequency
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        frequency:
          $ref: '#/components/schemas/Frequency'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateHabitCompletionRequest:
      type: object
      required:
        - completedOn
      properties:
        completedOn:
          type: string
          format: date
        note:
          type: string
          nullable: true
    HabitCompletionResponse:
      type: object
      required:
        - id
        - habitId
        - completedOn
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        habitId:
          type: string
          format: uuid
        completedOn:
          type: string
          format: date
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
